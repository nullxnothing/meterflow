<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meterflow · Zauth Admin</title>
  <style>
    :root { color-scheme: dark; --bg:#07111f; --card:#0d1a2d; --line:#1f3350; --text:#eef6ff; --muted:#8fa7c4; --accent:#5ea1ff; --bad:#ff6b7a; --ok:#6ef0a5; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; padding:24px; background:radial-gradient(circle at top left,#15345d,transparent 38%),var(--bg); color:var(--text); font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    main { width:min(560px,100%); background:rgba(13,26,45,.92); border:1px solid var(--line); border-radius:24px; padding:24px; box-shadow:0 24px 80px rgba(0,0,0,.35); }
    h1 { margin:0 0 8px; font-size:28px; letter-spacing:-.04em; }
    p { color:var(--muted); line-height:1.55; }
    label { display:block; margin:18px 0 8px; color:#cde2ff; font-weight:700; }
    input, textarea { width:100%; border:1px solid var(--line); border-radius:14px; background:#071225; color:var(--text); padding:14px; font:inherit; }
    textarea { min-height:140px; resize:vertical; }
    button { width:100%; margin-top:18px; border:0; border-radius:16px; background:linear-gradient(135deg,#5ea1ff,#7f6dff); color:white; padding:15px 18px; font-weight:800; font-size:16px; }
    button:disabled { opacity:.65; }
    pre { white-space:pre-wrap; word-break:break-word; border:1px solid var(--line); border-radius:14px; padding:14px; background:#061020; color:#cfe1ff; min-height:72px; }
    .ok { color:var(--ok); } .bad { color:var(--bad); }
  </style>
</head>
<body>
  <main>
    <h1>Submit Meterflow to Zauth</h1>
    <p>Paste the production <strong>ADMIN_KEY</strong> from Vercel, then tap submit. The key is only sent to this same Meterflow domain and is not saved in the browser.</p>

    <label for="key">Admin key</label>
    <input id="key" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="mf_admin_..." />

    <label for="body">Listing metadata</label>
    <textarea id="body" spellcheck="false">{
  "name": "Meterflow Token Risk",
  "displayName": "Meterflow Token Risk MCP Tool",
  "providerName": "Meterflow",
  "category": "mcp-tool",
  "description": "Paid x402 MCP endpoint for Solana token risk checks.",
  "docsUrl": "https://meterflow.fun/docs",
  "examplePrompt": "Analyze this Solana token for risk signals."
}</textarea>

    <button id="submit">Submit to Zauth</button>

    <label>Result</label>
    <pre id="result">Ready.</pre>
  </main>
  <script>
    const $ = (id) => document.getElementById(id);
    $('submit').addEventListener('click', async () => {
      const key = $('key').value.trim();
      if (!key) return $('result').textContent = 'Paste ADMIN_KEY first.';

      let payload;
      try { payload = JSON.parse($('body').value); }
      catch (err) { return $('result').textContent = `Invalid JSON body: ${err.message}`; }

      $('submit').disabled = true;
      $('result').textContent = 'Submitting...';
      try {
        const res = await fetch('/v1/admin/zauth/submit-default', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const text = await res.text();
        let data;
        try { data = JSON.parse(text); } catch { data = text; }
        $('result').innerHTML = `${res.ok ? '<span class="ok">Success</span>' : '<span class="bad">Failed</span>'} · HTTP ${res.status}\n\n${JSON.stringify(data, null, 2)}`;
      } catch (err) {
        $('result').innerHTML = `<span class="bad">Network error</span>\n\n${err.message}`;
      } finally {
        $('submit').disabled = false;
      }
    });
  </script>
</body>
</html>
