name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --omit=optional --no-audit --no-fund

      - name: Build
        run: npm run build

  api-proxy:
    name: API proxy smoke tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --omit=optional --no-audit --no-fund

      - name: Syntax check changed backend entrypoints
        run: |
          node --check api-proxy/app.js
          node --check api-proxy/server.js
          node --check api-proxy/routes/admin.js
          node --check api-proxy/routes/alpha.js
          node --check api-proxy/oauth/routes.js
          node --check api-proxy/tools/definitions.js
          node --check api-proxy/tools/executor.js
          node --check api-proxy/lib/postgres.js
          node --check api-proxy/lib/redis.js

      - name: Run smoke tests
        run: npm run test -w api-proxy
