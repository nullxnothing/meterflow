<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meterflow · Zauth Admin</title>
  <link rel="stylesheet" href="/site/shared.css">
  <style>
    :root { color-scheme: dark; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; padding:24px; background:radial-gradient(circle at top left,rgba(var(--accent-rgb),.18),transparent 38%),var(--bg); color:var(--text); font-family:var(--font-body); }
    main { width:min(560px,100%); background:var(--panel-bg); border:1px solid var(--panel-border); border-radius:var(--radius-lg); padding:24px; box-shadow:var(--shadow-card); }
    h1 { margin:0 0 8px; font-family:var(--font-display); font-size:28px; letter-spacing:0; }
    p { color:var(--text-dim); line-height:1.55; }
    label { display:block; margin:18px 0 8px; color:var(--text-blue-pale-3); font-weight:700; }
    input, textarea { width:100%; border:1px solid var(--field-border); border-radius:var(--radius-md); background:var(--field-bg); color:var(--text); padding:14px; font:inherit; }
    textarea { min-height:140px; resize:vertical; }
    button { width:100%; margin-top:18px; border:0; border-radius:var(--radius-lg); background:var(--gradient-primary); color:var(--text-inverse-soft); padding:15px 18px; font-weight:800; font-size:16px; }
    button:disabled { opacity:.65; }
    pre { white-space:pre-wrap; word-break:break-word; border:1px solid var(--field-border); border-radius:var(--radius-md); padding:14px; background:var(--field-bg); color:var(--text-blue-soft); min-height:72px; }
    .ok { color:var(--green); } .bad { color:var(--red-soft); }
  </style>
</head>
<body>
  <main>
    <h1>Submit Meterflow to Zauth</h1>
    <p>Paste the production <strong>ADMIN_KEY</strong> from Vercel, then tap submit. The key is only sent to this same Meterflow domain and is not saved in the browser.</p>

    <label for="key">Admin key</label>
    <input id="key" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="mf_admin_..." />

    <label for="body">Listing metadata</label>
    <textarea id="body" spellcheck="false">{
  "name": "Meterflow Token Risk",
  "displayName": "Meterflow Token Risk MCP Tool",
  "providerName": "Meterflow",
  "category": "mcp-tool",
  "description": "Paid x402 MCP endpoint for Solana token risk checks.",
  "docsUrl": "https://meterflow.fun/docs",
  "examplePrompt": "Analyze this Solana token for risk signals."
}</textarea>

    <button id="submit">Submit to Zauth</button>

    <label>Result</label>
    <pre id="result">Ready.</pre>
  </main>
  <script>
    const $ = (id) => document.getElementById(id);
    $('submit').addEventListener('click', async () => {
      const key = $('key').value.trim();
      if (!key) return $('result').textContent = 'Paste ADMIN_KEY first.';

      let payload;
      try { payload = JSON.parse($('body').value); }
      catch (err) { return $('result').textContent = `Invalid JSON body: ${err.message}`; }

      $('submit').disabled = true;
      $('result').textContent = 'Submitting...';
      try {
        const res = await fetch('/v1/admin/zauth/submit-default', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const text = await res.text();
        let data;
        try { data = JSON.parse(text); } catch { data = text; }
        $('result').innerHTML = `${res.ok ? '<span class="ok">Success</span>' : '<span class="bad">Failed</span>'} · HTTP ${res.status}\n\n${JSON.stringify(data, null, 2)}`;
      } catch (err) {
        $('result').innerHTML = `<span class="bad">Network error</span>\n\n${err.message}`;
      } finally {
        $('submit').disabled = false;
      }
    });
  </script>
</body>
</html>
