<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="logo">
      <div class="logo-dot"></div>
      <span>Infinite Alpha <small style="opacity:0.5;font-size:10px;">(Beta)</small></span>
    </div>

    <div id="auth-section" class="section hidden">
      <p class="desc">Enter your Infinite API key to unlock free CT intelligence on Twitter/X.</p>
      <input type="text" id="api-key-input" placeholder="inf_xxxxx..." autocomplete="off" spellcheck="false">
      <button id="connect-btn" class="btn-primary">Connect</button>
      <p class="hint">Get your key at <a href="https://infinitekeys.fun" target="_blank">infinitekeys.fun</a></p>
    </div>

    <div id="connected-section" class="section hidden">
      <div class="status">
        <div class="status-dot"></div>
        <span>Connected</span>
      </div>
      <div id="stats" class="stats"></div>
      <button id="sidepanel-btn" class="btn-secondary">Open Side Panel</button>
      <button id="disconnect-btn" class="btn-danger">Disconnect</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
