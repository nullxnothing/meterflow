<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="logo">
      <img class="logo-mark" src="../icons/meterflow-mark.svg" alt="">
      <span>Meterflow Signal</span>
    </div>

    <div id="auth-section" class="section hidden">
      <p class="desc">Enter your Meterflow API key to unlock metered CT intelligence on Twitter/X.</p>
      <input type="text" id="api-key-input" placeholder="mf_xxxxx..." autocomplete="off" spellcheck="false">
      <button id="connect-btn" class="btn-primary">Connect</button>
      <p class="hint">Get your key in the <a href="https://meterflow.fun/dashboard" target="_blank">Meterflow dashboard</a></p>
    </div>

    <div id="connected-section" class="section hidden">
      <div class="status">
        <div class="status-dot"></div>
        <span>Connected</span>
      </div>
      <div id="stats" class="stats"></div>
      <button id="sidepanel-btn" class="btn-secondary">Open Side Panel</button>
      <button id="disconnect-btn" class="btn-danger">Disconnect</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
