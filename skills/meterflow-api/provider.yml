name: meterflow
subdomain: meterflow
title: Meterflow
description: >
  Hosted API and MCP tool metering with x402 and MPP-ready Solana USDC
  payment flows, receipts, budgets, provider revenue, and webhooks.
category: developer_tools
version: v1

# This spec is used for pay.sh Skills Registry discoverability.
# The Vercel API function implements payment verification natively.
# Run: pay --sandbox curl https://meterflow.fun/proxy/mcp/token-risk -d '...'

routing:
  type: proxy
  url: ${METERFLOW_UPSTREAM_URL:-https://meterflow.fun/proxy}

operator:
  currencies:
    usd: ['USDC']
  network: mainnet
  fee_payer: true

endpoints:
  - method: GET
    path: health
    description: 'Health check. Free.'

  - method: POST
    path: mcp/token-risk
    resource: mcp_token_risk
    description: 'MCP token risk scoring — returns risk score, red flags, and metadata.'
    metering:
      dimensions:
        - direction: usage
          unit: requests
          scale: 1
          tiers:
            - price_usd: 0.006
