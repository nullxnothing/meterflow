<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="The page you're looking for doesn't exist. Return to Meterflow.">
<meta name="theme-color" content="#03060c">
<title>404 — Meterflow</title>
<link rel="icon" type="image/svg+xml" href="/assets/brand/meterflow-mark.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Inter+Tight:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/site/shared.css">
<style>
.notfound {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background:
    radial-gradient(700px 400px at 50% 30%, rgba(79, 156, 255, 0.18), transparent 70%),
    var(--bg-deep);
  text-align: center;
}
.notfound-inner { max-width: 480px; }
.notfound-code {
  font-family: var(--font-display);
  font-size: clamp(96px, 18vw, 160px);
  font-weight: 800;
  letter-spacing: -0.04em;
  line-height: 1;
  background: linear-gradient(180deg, var(--accent-2) 0%, var(--accent) 50%, var(--accent-deep) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 16px;
}
.notfound-title {
  font-family: var(--font-display);
  font-size: clamp(22px, 3vw, 32px);
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 12px;
  color: var(--text);
}
.notfound-sub {
  font-size: 15px;
  color: var(--text-dim);
  line-height: 1.7;
  margin-bottom: 32px;
}
.notfound-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
</style>
</head>
<body>
<a href="#main" class="skip-link">Skip to content</a>
<main id="main" class="notfound">
  <div class="notfound-inner">
    <div class="notfound-code">404</div>
    <h1 class="notfound-title">Page not found</h1>
    <p class="notfound-sub">The page you're looking for doesn't exist or has moved. Try heading back to the dashboard or docs.</p>
    <div class="notfound-actions">
      <a href="/" class="btn-primary">Back to home</a>
      <a href="/docs" class="btn-secondary">Read docs</a>
    </div>
  </div>
</main>
</body>
</html>
